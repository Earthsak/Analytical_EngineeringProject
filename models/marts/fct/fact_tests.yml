version: 2

models:
  - name: fct_orders
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

      - name: customer_id
        tests:
          - unique
          - not_null
    
  - name: fct_order_items
    columns:
      - name: order_id
        tests:
          - not_null
          
      - name: order_item_id
        tests:
          - not_null    
          
      - name: product_id
        tests:
          - not_null
    
  - name: fct_daily_revenue
    columns:
      - name: total_orders
        tests:
          - not_null
          - unique
          
      - name: product_revenue
        tests:
          - not_null    
    
    
  - name: mart_model
    columns:
      - name: order_date
        tests:
          - not_null
          - unique